# Keep long-running playbooks from dropping SSH (e.g. HammerDB setup ~1h).
# ServerAliveInterval=60  → send keepalive every 60s
# ServerAliveCountMax=120 → allow 120 missed replies (~2h) before disconnect
[ssh_connection]
ssh_args = -o ServerAliveInterval=60 -o ServerAliveCountMax=120 -o ConnectTimeout=30
# How long to wait when establishing SSH (seconds)
timeout = 60
