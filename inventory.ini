[new_ec2_instances]
# When experimenting with the test with VM and RDS already created,
# you can add a line like this to allow running test play
# 3.147.126.26 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/hammerdb-key.pem rds_instance_endpoint=rdsperfdbm7gxlargevu2run1rds.cv5vurnttubm.us-east-2.rds.amazonaws.com

[all:vars]
# These will be used as a tags in AWS and to name things
# So if you want to run multiple runs in parallel, change project name
project_name = rds-perf-comparision
owner_name = kmagar

# General AWS variables
aws_region = us-east-2
aws_az1 = us-east-2a
aws_az2 = us-east-2b

# EC2 specific variables describing VM that drives the test
aws_ec2_ami_id = ami-068d5d5ed1eeea07c
aws_ec2_instance_type = m7i.12xlarge
aws_ec2_ssh_key_name = hammerdb-key
aws_ec2_ssh_private_key_file = "~/.ssh/hammerdb-key.pem"

# RDS specific variables describing RDS where the test is running
aws_rds_instance_type = db.m7g.xlarge
aws_rds_storage = 400
aws_rds_iops = 30000
aws_rds_engine = postgres
aws_rds_engine_version = 17.6
aws_rds_user = postgres
aws_rds_password = rdsperfcomparision1234
aws_rds_port = 5432

# RDS parameter group (PostgreSQL DB params; sizes in MB unless noted)
rds_param_max_wal_size = 200000
rds_param_min_wal_size = 1024
rds_param_log_checkpoints = on
rds_param_checkpoint_timeout = 3600
rds_param_checkpoint_completion_target = 0.9
rds_param_autovacuum = off
rds_param_log_autovacuum_min_duration = 0
rds_param_bgwriter_lru_maxpages = 0
rds_param_bgwriter_flush_after = 0
rds_param_synchronous_commit = off
rds_param_work_mem = 128
rds_param_maintenance_work_mem = 1024
rds_param_random_page_cost = 1.1
rds_param_cpu_tuple_cost = 0.03
rds_param_effective_cache_size = 65536
rds_param_log_min_duration_statement = 10
rds_param_autovacuum_max_workers = 10
rds_param_autovacuum_vacuum_cost_limit = 3000
rds_param_lc_messages = C

# HammerDB test config (v5.0-postgres = HammerDB 5.x PostgreSQL client image)
hammerdb_container_image = docker.io/tpcorg/hammerdb:v5.0-postgres
hammerdb_benchmark = TPC-C
hammerdb_virtual_users = 2
hammerdb_warehouses = 1024
hammerdb_rampup = 2
hammerdb_duration = 5

[new_ec2_instances:vars]
# Accept the host key when connecting to the host for the first time
# https://stackoverflow.com/questions/32297456/how-to-ignore-ansible-ssh-authenticity-checking
ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new'

[local]
localhost ansible_connection=local