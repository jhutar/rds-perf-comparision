---
- name: Configure newly created EC2 instance
  hosts: new_ec2_instances
  become: yes
  # Default become timeout is 12s; busy EC2 (e.g. high-VU HammerDB) can delay sudo enough to miss it.
  # Play var applies even if ansible.cfg is not picked up from CWD.
  vars:
    ansible_become_timeout: 300
  gather_facts: yes
  tasks:
    - name: Install Podman
      yum:
        name: podman
        state: present

    - name: Pull HammerDB PostgreSQL container image
      command: podman pull {{ hammerdb_container_image | default('docker.io/tpcorg/hammerdb:v5.0-postgres') }}

    - name: Deploy HammerDB test scripts
      template:
          src: "{{ item.src }}"
          dest: "{{ item.dest }}"
      loop:
        - src: "../templates/hammerdb-tpcc-setup.tcl.j2"
          dest: "setup.tcl"
        - src: "../templates/hammerdb-tpcc-run.tcl.j2"
          dest: "run.tcl"
        - src: "../templates/hammerdb-tpcc-cleanup.tcl.j2"   # Not used in the playbook, mean for manual cleanup when rerunning the test manually
          dest: "cleanup.tcl"

    - name: Record test start time for CloudWatch (start of Setup HammerDB test)
      command: date +%s
      register: test_start_time
      changed_when: false

    - name: Set test start epoch
      set_fact:
        test_start_epoch: "{{ test_start_time.stdout }}"

    # HammerDB v5 CLI runs TclReadLine/stty and needs a pseudo-TTY (-t). Piping scripts still
    # needs -i. iconv + UTF-8 locale keep stdout valid UTF-8 for Ansible's JSON.
    - name: Setup HammerDB test
      shell: |
        set -o pipefail
        cat setup.tcl | podman run --network=host --rm -it \
          -e LANG=C.UTF-8 -e LC_ALL=C.UTF-8 \
          --name hammerdb --replace {{ hammerdb_container_image | default('docker.io/tpcorg/hammerdb:v5.0-postgres') }} \
          ./hammerdbcli 2>&1 | iconv -c -f UTF-8 -t UTF-8
      register: hammerdb_setup_out

    - name: Show test setup output
      debug:
        var: hammerdb_setup_out

    - name: Check test setup was OK
      vars:
        lines_all: "{{ hammerdb_setup_out.stdout_lines | select('match', '.*:FINISHED .*') }}"
        lines_succeeded: "{{ lines_all | select('match', '.*:FINISHED SUCCESS') }}"
      assert:
        that:
          - lines_all|length > 0
          - lines_all|length == lines_succeeded|length

    - name: VACUUM ANALYZE and CHECKPOINT on RDS before benchmark
      shell: |
        podman run --rm --network=host -e PGPASSWORD docker.io/library/postgres:17 psql \
          -h {{ rds_instance_endpoint }} -p {{ aws_rds_port }} -U {{ aws_rds_user }} -d benchmark \
          -c "VACUUM ANALYZE" -c "CHECKPOINT"
      environment:
        PGPASSWORD: "{{ aws_rds_password }}"
      ignore_errors: true

    - name: Run HammerDB test
      shell: |
        set -o pipefail
        cat run.tcl | podman run --network=host --rm -it \
          -e LANG=C.UTF-8 -e LC_ALL=C.UTF-8 \
          --name hammerdb --replace {{ hammerdb_container_image | default('docker.io/tpcorg/hammerdb:v5.0-postgres') }} \
          ./hammerdbcli 2>&1 | iconv -c -f UTF-8 -t UTF-8
      register: hammerdb_run_out

    - name: Record test end time for CloudWatch (after Run HammerDB test completes)
      command: date +%s
      register: test_end_time
      changed_when: false

    - name: Set test end epoch
      set_fact:
        test_end_epoch: "{{ test_end_time.stdout }}"

    - name: Show test run output
      debug:
        var: hammerdb_run_out

    - name: Check test run was OK
      vars:
        lines_all: "{{ hammerdb_run_out.stdout_lines | select('match', '.*:FINISHED .*') }}"
        lines_succeeded: "{{ lines_all | select('match', '.*:FINISHED SUCCESS') }}"
      assert:
        that:
          - lines_all|length > 0
          - lines_all|length == lines_succeeded|length

    - name: Parse new orders per minute value out of output
      set_fact:
        result_nopm: "{{ hammerdb_run_out.stdout | regex_search('TEST RESULT : System achieved ([0-9]+) NOPM from [0-9]+ PostgreSQL TPM','\\1') | first }}"

    - name: Parse transactions per minute value out of output
      set_fact:
        result_tpm: "{{ hammerdb_run_out.stdout | regex_search('TEST RESULT : System achieved [0-9]+ NOPM from ([0-9]+) PostgreSQL TPM','\\1') | first }}"

    - name: Show results
      debug:
        msg: "RESULTS: NOPM = {{ result_nopm }}, TPM = {{ result_tpm }}"

- name: Write run metadata for fetch-metrics
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    results_dir: "{{ perf_results_path | default(playbook_dir ~ '/../results', true) }}"
    setup_metadata_basename: >-
      {{ 'setup-metadata-' ~ perf_run_stamp ~ '.json'
      if (perf_run_stamp is defined and (perf_run_stamp | string | trim | length) > 0) else 'setup-metadata.json' }}
    run_metadata_basename: >-
      {{ 'run-metadata-' ~ perf_run_stamp ~ '.json'
      if (perf_run_stamp is defined and (perf_run_stamp | string | trim | length) > 0) else 'run-metadata.json' }}
  tasks:
    - name: Load setup metadata (when test run separately from setup)
      include_vars:
        file: "{{ results_dir }}/{{ setup_metadata_basename }}"
        name: setup_meta
      ignore_errors: true

    - name: Ensure results directory exists
      file:
        path: "{{ results_dir }}"
        state: directory

    - name: Build run metadata from test host (when new_ec2_instances has hosts)
      set_fact:
        run_metadata: "{{
          {
            'perf_run_stamp': perf_run_stamp | default((setup_meta | default({})).get('perf_run_stamp', '')) | string,
            'ec2_instance_id': hostvars[groups['new_ec2_instances'][0]].get('ec2_instance_id') or (setup_meta | default({})).get('ec2_instance_id'),
            'rds_instance_id': hostvars[groups['new_ec2_instances'][0]].get('rds_instance_id') or (setup_meta | default({})).get('rds_instance_id'),
            'test_start_epoch': (hostvars[groups['new_ec2_instances'][0]] | default({})).get('test_start_epoch', '') | string,
            'test_end_epoch': (hostvars[groups['new_ec2_instances'][0]] | default({})).get('test_end_epoch', '') | string,
            'aws_region': hostvars[groups['new_ec2_instances'][0]].get('aws_region') or (setup_meta | default({})).get('aws_region'),
            'aws_rds_instance_type': (setup_meta | default({})).get('aws_rds_instance_type') or hostvars[groups['new_ec2_instances'][0]].get('aws_rds_instance_type'),
            'aws_ec2_instance_type': (setup_meta | default({})).get('aws_ec2_instance_type') or hostvars[groups['new_ec2_instances'][0]].get('aws_ec2_instance_type'),
            'virtual_users': hostvars[groups['new_ec2_instances'][0]].get('hammerdb_virtual_users') | default(hammerdb_virtual_users | default(4)) | string,
            'warehouse_count': hostvars[groups['new_ec2_instances'][0]].get('hammerdb_warehouses') | default(hammerdb_warehouses | default(50)) | string,
            'nopm': hostvars[groups['new_ec2_instances'][0]].get('result_nopm') | default('') | string,
            'tpm': hostvars[groups['new_ec2_instances'][0]].get('result_tpm') | default('') | string
          }
        }}"
      when: groups['new_ec2_instances'] | length > 0

    - name: Build run metadata from setup only (when no test hosts ran)
      set_fact:
        run_metadata: "{{
          {
            'perf_run_stamp': perf_run_stamp | default((setup_meta | default({})).get('perf_run_stamp', '')) | string,
            'ec2_instance_id': (setup_meta | default({})).get('ec2_instance_id', ''),
            'rds_instance_id': (setup_meta | default({})).get('rds_instance_id', ''),
            'test_start_epoch': '',
            'test_end_epoch': '',
            'aws_region': (setup_meta | default({})).get('aws_region', ''),
            'aws_rds_instance_type': (setup_meta | default({})).get('aws_rds_instance_type', ''),
            'aws_ec2_instance_type': (setup_meta | default({})).get('aws_ec2_instance_type', ''),
            'virtual_users': (hammerdb_virtual_users | default(4)) | string,
            'warehouse_count': (hammerdb_warehouses | default(50)) | string,
            'nopm': '',
            'tpm': ''
          }
        }}"
      when: groups['new_ec2_instances'] | length == 0

    - name: Write run metadata for CloudWatch fetch
      copy:
        content: "{{ run_metadata | to_nice_json }}"
        dest: "{{ results_dir }}/{{ run_metadata_basename }}"
