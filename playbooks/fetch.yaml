---
# CloudWatch: RDS (AWS/RDS) and load-generator EC2 (AWS/EC2). Statistics follow metric docs.
# Engine-specific RDS metrics may return no datapoints; EC2/RDS fetches use ignore_errors on the loop.
- name: Fetch CloudWatch RDS and EC2 metrics
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # perf_results_path from matrix (-e); avoid perf_results_dir|default(perf_results_dir) (recursion).
    perf_results_dir: "{{ perf_results_path | default(playbook_dir ~ '/../results', true) }}"
    run_metadata_basename: >-
      {{ 'run-metadata-' ~ perf_run_stamp ~ '.json'
      if (perf_run_stamp is defined and (perf_run_stamp | string | trim | length) > 0) else 'run-metadata.json' }}
    rds_metrics:
      - { name: CPUUtilization, stats: Maximum Average }
      - { name: DatabaseConnections, stats: Maximum Average }
      - { name: DiskQueueDepth, stats: Maximum Average }
      - { name: FreeableMemory, stats: Average Minimum }
      - { name: FreeStorageSpace, stats: Average Minimum }
      - { name: NetworkReceiveThroughput, stats: Maximum Average }
      - { name: NetworkTransmitThroughput, stats: Maximum Average }
      - { name: ReadIOPS, stats: Maximum Average }
      - { name: ReadLatency, stats: Maximum Average }
      - { name: ReadThroughput, stats: Maximum Average }
      - { name: WriteIOPS, stats: Maximum Average }
      - { name: WriteLatency, stats: Maximum Average }
      - { name: WriteThroughput, stats: Maximum Average }
      - { name: EBSByteBalance%, stats: Average }
      - { name: EBSIOBalance%, stats: Average }
      - { name: SwapUsage, stats: Maximum Average }
      - { name: CheckpointLag, stats: Maximum Average }
      - { name: MaximumUsedTransactionIDs, stats: Maximum }
      - { name: OldestLogicalReplicationSlotLag, stats: Maximum }
      - { name: OldestReplicationSlotLag, stats: Maximum }
      - { name: ReplicationSlotDiskUsage, stats: Maximum Average }
      - { name: TransactionLogsDiskUsage, stats: Maximum Average }
      - { name: TransactionLogsGeneration, stats: Maximum Average }
      - { name: DBLoad, stats: Maximum Average }
      - { name: DBLoadCPU, stats: Maximum Average }
      - { name: DBLoadNonCPU, stats: Maximum Average }
      - { name: DBLoadRelativeToNumVCPUs, stats: Maximum Average }
    # AWS/EC2 metrics (from list-metrics for InstanceId). Period uses ec2_cw_period (min 300s).
    ec2_metrics:
      - { name: CPUUtilization, stats: Maximum Average }
      - { name: NetworkIn, stats: Sum Maximum Average }
      - { name: NetworkOut, stats: Sum Maximum Average }
      - { name: NetworkPacketsIn, stats: Sum Maximum Average }
      - { name: NetworkPacketsOut, stats: Sum Maximum Average }
      - { name: EBSReadBytes, stats: Sum Maximum Average }
      - { name: EBSWriteBytes, stats: Sum Maximum Average }
      - { name: EBSReadOps, stats: Sum Maximum Average }
      - { name: EBSWriteOps, stats: Sum Maximum Average }
      - { name: InstanceEBSIOPSExceededCheck, stats: Maximum Average }
      - { name: InstanceEBSThroughputExceededCheck, stats: Maximum Average }
      - { name: MetadataNoToken, stats: Sum Maximum Average }
  tasks:
    - name: Load run metadata
      include_vars:
        file: "{{ perf_results_dir }}/{{ run_metadata_basename }}"
        name: run_meta
      ignore_errors: true

    - name: Get CloudWatch time range (start)
      command: date -d @{{ run_meta.test_start_epoch }} -u +%Y-%m-%dT%H:%M:%SZ
      register: cw_start_iso
      changed_when: false
      when: run_meta is defined

    - name: Get CloudWatch time range (end, +2 min buffer)
      command: date -d @{{ run_meta.test_end_epoch | int + 120 }} -u +%Y-%m-%dT%H:%M:%SZ
      register: cw_end_iso
      changed_when: false
      when: run_meta is defined

    - name: Set CloudWatch period to full duration (min 60s, multiple of 60)
      set_fact:
        cw_period: "{{ [(((run_meta.test_end_epoch | int + 120) - (run_meta.test_start_epoch | int)) + 59) // 60 * 60, 60] | max }}"
      when: run_meta is defined

    - name: Set EC2 CloudWatch period (min 300s for basic monitoring)
      set_fact:
        ec2_cw_period: "{{ [cw_period | default(60) | int, 300] | max }}"
      when: run_meta is defined

    - name: Fetch RDS CloudWatch metrics
      command: >
        aws cloudwatch get-metric-statistics
        --namespace AWS/RDS
        --metric-name {{ item.name }}
        --dimensions Name=DBInstanceIdentifier,Value={{ run_meta.rds_instance_id }}
        --start-time {{ cw_start_iso.stdout }}
        --end-time {{ cw_end_iso.stdout }}
        --period {{ cw_period }}
        --statistics {{ item.stats }}
        --region {{ run_meta.aws_region }}
      register: rds_metrics_results
      loop: "{{ rds_metrics }}"
      loop_control:
        label: "{{ item.name }}"
      ignore_errors: true
      changed_when: false
      when: run_meta is defined

    - name: Fetch EC2 CloudWatch metrics
      command: >
        aws cloudwatch get-metric-statistics
        --namespace AWS/EC2
        --metric-name {{ item.name }}
        --dimensions Name=InstanceId,Value={{ run_meta.ec2_instance_id }}
        --start-time {{ cw_start_iso.stdout }}
        --end-time {{ cw_end_iso.stdout }}
        --period {{ ec2_cw_period | default(cw_period) }}
        --statistics {{ item.stats }}
        --region {{ run_meta.aws_region }}
      register: ec2_metrics_results
      loop: "{{ ec2_metrics }}"
      loop_control:
        label: "{{ item.name }}"
      ignore_errors: true
      changed_when: false
      when: run_meta is defined

    - name: Build RDS CloudWatch metrics dict (safe parse per metric)
      set_fact:
        rds_metrics_dict: "{{ rds_metrics_dict | default({}) | combine(_one) }}"
      vars:
        _one: "{{ { item.item.name: ((item.stdout | from_json).Datapoints[0] if (item.stdout | from_json).Datapoints | length > 0 else null) } if (item.rc == 0 and item.stdout is defined and (item.stdout | trim).startswith('{')) else {} }}"
      loop: "{{ rds_metrics_results.results | default([]) }}"
      when:
        - run_meta is defined
        - rds_metrics_results.results is defined
        - item.item is defined
      loop_control:
        label: "{{ item.item.name }}"
      ignore_errors: true

    - name: Set RDS metrics dict empty when no results
      set_fact:
        rds_metrics_dict: {}
      when:
        - run_meta is defined
        - rds_metrics_dict is not defined

    - name: Build EC2 CloudWatch metrics dict (safe parse per metric)
      set_fact:
        ec2_metrics_dict: "{{ ec2_metrics_dict | default({}) | combine(_one_ec2) }}"
      vars:
        _one_ec2: "{{ { item.item.name: ((item.stdout | from_json).Datapoints[0] if (item.stdout | from_json).Datapoints | length > 0 else null) } if (item.rc == 0 and item.stdout is defined and (item.stdout | trim).startswith('{')) else {} }}"
      loop: "{{ ec2_metrics_results.results | default([]) }}"
      when:
        - run_meta is defined
        - ec2_metrics_results.results is defined
        - item.item is defined
      loop_control:
        label: "{{ item.item.name }}"
      ignore_errors: true

    - name: Set EC2 metrics dict empty when no results
      set_fact:
        ec2_metrics_dict: {}
      when:
        - run_meta is defined
        - ec2_metrics_dict is not defined

    - name: Set final metrics filename (vu_..._wh_..._RDS_EC2_<perf_run_stamp>.json; stamp avoids parallel overwrites)
      set_fact:
        final_metrics_filename: >-
          {{ 'vu_' ~ (run_meta.virtual_users | default('?') | string) ~ '_wh_' ~ (run_meta.warehouse_count | default('?') | string) ~ '_'
          ~ ((run_meta.aws_rds_instance_type | default('unknown')) | replace('.', '_')) ~ '_'
          ~ ((run_meta.aws_ec2_instance_type | default('unknown')) | replace('.', '_'))
          ~ (('_' ~ (perf_run_stamp | default(run_meta.perf_run_stamp | default('')) | string | trim))
             if (perf_run_stamp | default(run_meta.perf_run_stamp | default('')) | string | trim | length) > 0 else '')
          ~ '.json' }}
      when: run_meta is defined

    - name: Write final metrics JSON (NOPM, TPM, RDS + EC2 CloudWatch)
      copy:
        content: "{{ {
          'nopm': run_meta.nopm | default(''),
          'tpm': run_meta.tpm | default(''),
          'rds_cloudwatch': rds_metrics_dict | default({}),
          'ec2_cloudwatch': ec2_metrics_dict | default({})
        } | to_nice_json }}"
        dest: "{{ perf_results_dir }}/{{ final_metrics_filename }}"
      when:
        - run_meta is defined
        - final_metrics_filename is defined
