---
- name: Deploy EC2 and RDS Infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    # Parallel matrix: pass -e perf_results_path=... (must match run-matrix results_dir).
    # Use perf_results_path (not self-referential perf_results_dir) to avoid recursive templating.
    perf_results_dir: "{{ perf_results_path | default(playbook_dir ~ '/../results', true) }}"
  tasks:
    - name: Set perf_run_stamp if not passed (matrix passes RUN_TS; same value must be used for fetch)
      ansible.builtin.set_fact:
        perf_run_stamp: "{{ lookup('pipe', \"date -Ins | sed 's/[^a-zA-Z0-9-]/_/g'\") | trim }}"
      when: perf_run_stamp is not defined or (perf_run_stamp | string | trim | length == 0)

    - name: Create a VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ project_name }}-vpc"
        cidr_block: "10.0.0.0/16"
        region: "{{ aws_region }}"
        tags:
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: vpc

    - name: Create subnet 1
      amazon.aws.ec2_vpc_subnet:
        state: present
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.1.0/24"
        az: "{{ aws_az1 }}"
        region: "{{ aws_region }}"
        map_public: yes
        tags:
          Name: "{{ project_name }}-subnet1"
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: subnet1

    - name: Create subnet 2
      amazon.aws.ec2_vpc_subnet:
        state: present
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "10.0.2.0/24"
        az: "{{ aws_az2 }}"
        region: "{{ aws_region }}"
        map_public: yes
        tags:
          Name: "{{ project_name }}-subnet2"
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: subnet2

    - name: Create an internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        tags:
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: igw

    - name: Create a route table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        subnets:
          - "{{ subnet1.subnet.id }}"
        routes:
          - dest: "0.0.0.0/0"
            gateway_id: "{{ igw.gateway_id }}"
        tags:
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: route

    - name: Create a security group for the EC2 instance
      amazon.aws.ec2_group:
        name: "{{ project_name }}-ec2-sg"
        description: "Allow SSH from anywhere and all outbound traffic"
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: "0.0.0.0/0"
            rule_desc: "Allow SSH from anywhere"
        rules_egress:
          - proto: all
            cidr_ip: "0.0.0.0/0"
            rule_desc: "Allow all outbound traffic"
        tags:
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: ec2_sg

    - name: Create a security group for the RDS instance
      amazon.aws.ec2_group:
        name: "{{ project_name }}-rds-sg"
        description: "Allow PostgreSQL traffic from the EC2 security group"
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            ports:
              - 5432
            group_id: "{{ ec2_sg.group_id }}"
            rule_desc: "Allow PostgreSQL traffic from EC2"
        tags:
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: rds_sg

    - name: Create RDS subnet group
      amazon.aws.rds_subnet_group:
        state: present
        name: "{{ project_name }}-rds-subnet-group"
        description: "Subnet group for RDS"
        region: "{{ aws_region }}"
        subnets:
          - "{{ subnet1.subnet.id }}"
          - "{{ subnet2.subnet.id }}"
        tags:
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: rds_subnet_group

    - name: Create RDS parameter group (WAL/checkpoint/benchmark tuning)
      amazon.aws.rds_instance_param_group:
        state: present
        name: "{{ ( project_name + '-pg17-bench' ) | regex_replace('[^a-zA-Z0-9-]+', '') }}"
        description: "PostgreSQL 17 benchmark tuning"
        engine: postgres17
        region: "{{ aws_region }}"
        params:
          # RDS expects size params as numeric only (unit is MB for these)
          max_wal_size: "{{ rds_param_max_wal_size }}"
          min_wal_size: "{{ rds_param_min_wal_size }}"
          log_checkpoints: "{{ rds_param_log_checkpoints }}"
          checkpoint_timeout: "{{ rds_param_checkpoint_timeout }}"
          checkpoint_completion_target: "{{ rds_param_checkpoint_completion_target }}"
          autovacuum: "{{ rds_param_autovacuum }}"
          log_autovacuum_min_duration: "{{ rds_param_log_autovacuum_min_duration }}"
          bgwriter_lru_maxpages: "{{ rds_param_bgwriter_lru_maxpages }}"
          bgwriter_flush_after: "{{ rds_param_bgwriter_flush_after }}"
          synchronous_commit: "{{ rds_param_synchronous_commit }}"
          work_mem: "{{ rds_param_work_mem }}"
          maintenance_work_mem: "{{ rds_param_maintenance_work_mem }}"
          random_page_cost: "{{ rds_param_random_page_cost }}"
          cpu_tuple_cost: "{{ rds_param_cpu_tuple_cost }}"
          effective_cache_size: "{{ rds_param_effective_cache_size }}"
          log_min_duration_statement: "{{ rds_param_log_min_duration_statement }}"
          autovacuum_max_workers: "{{ rds_param_autovacuum_max_workers }}"
          autovacuum_vacuum_cost_limit: "{{ rds_param_autovacuum_vacuum_cost_limit }}"
          lc_messages: "{{ rds_param_lc_messages }}"
        tags:
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: rds_param_group

    - name: Create the RDS instance
      amazon.aws.rds_instance:
        state: "running"
        allocated_storage: "{{ aws_rds_storage }}"
        max_allocated_storage: "{{ aws_rds_storage }}"
        allow_major_version_upgrade: false
        auto_minor_version_upgrade: false
        availability_zone: "{{ aws_az1 }}"
        backup_retention_period: 0
        db_instance_class: "{{ aws_rds_instance_type }}"
        db_name: "{{ ( project_name + '-rds' ) | regex_replace('[^a-zA-Z0-9]+', '') }}"
        db_instance_identifier: "{{ ( project_name + '-rds' ) | regex_replace('[^a-zA-Z0-9]+', '') }}"
        db_subnet_group_name: "{{ rds_subnet_group.subnet_group.name }}"
        db_parameter_group_name: "{{ ( project_name + '-pg17-bench' ) | regex_replace('[^a-zA-Z0-9-]+', '') }}"
        deletion_protection: false
        enable_performance_insights: true
        engine: "{{ aws_rds_engine }}"
        engine_version: "{{ aws_rds_engine_version }}"
        iops: "{{ aws_rds_iops }}"   
        master_username: "{{ aws_rds_user }}"
        master_user_password: "{{ aws_rds_password }}"
        performance_insights_retention_period: 7
        port: "{{ aws_rds_port }}"
        publicly_accessible: false
        region: "{{ aws_region }}"
        storage_encrypted: true
        storage_type: "gp3"
        vpc_security_group_ids:
          - "{{ rds_sg.group_id }}"
        wait: yes
        tags:
          Name: "{{ project_name }}-rds"
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
      register: rds_instance

    - debug:
        var: rds_instance

    - name: Launch the EC2 instance
      amazon.aws.ec2_instance:
        state: "running"
        name: "{{ project_name }}-vm"
        key_name: "{{ aws_ec2_ssh_key_name }}"
        instance_type: "{{ aws_ec2_instance_type }}"
        image:
          id: "{{ aws_ec2_ami_id }}"
        region: "{{ aws_region }}"
        network_interfaces:
          - assign_public_ip: true
            delete_on_termination: true
            groups:
              - "{{ ec2_sg.group_id }}"
            subnet_id: "{{ subnet1.subnet.id }}"
        filters:
          tag:Name: "{{ project_name }}-vm"
          tag:Project: "{{ project_name }}"
          tag:Owner: "{{ owner_name }}"
          instance-state-name: "running"
        tags:
          Project: "{{ project_name }}"
          Owner: "{{ owner_name }}"
        termination_protection: false
        detailed_monitoring: true
        wait: yes
        wait_timeout: 600
      register: ec2_instance

    - name: Add new instance to host group
      add_host:
        name: "{{ ec2_instance.instances[0].network_interfaces[0].association.public_ip }}"
        groups: new_ec2_instances
        # Additional variabes needed in a test phase:
        ansible_user: ec2-user
        ansible_ssh_private_key_file: "{{ aws_ec2_ssh_private_key_file }}"
        rds_instance_endpoint: "{{ rds_instance.endpoint.address }}"
        ec2_instance_id: "{{ ec2_instance.instances[0].instance_id }}"
        rds_instance_id: "{{ rds_instance.db_instance_identifier }}"

    - name: Wait for SSH to come up
      wait_for:
        host: "{{ ec2_instance.instances[0].network_interfaces[0].association.public_ip }}"
        port: 22
        delay: 15
        timeout: 320
        state: started

    - name: Display connection information
      debug:
        msg:
          - "Using these AWS entities:"
          - "  VPC {{ vpc.vpc.id }}"
          - "  subnet 1 {{ subnet1.subnet.id }}"
          - "  subnet 2 {{ subnet2.subnet.id }}"
          - "  subnet group for RDS {{ rds_subnet_group.subnet_group.db_subnet_group_name }}"
          - "  route {{ route.route_table.id }}"
          - "  gateway {{ igw.gateway_id }}"
          - "  securty group for VM {{ ec2_sg.group_id }}"
          - "  securty group for RDS {{ rds_sg.group_id }}"
          - "EC2 Instance Public IP: {{ ec2_instance.instances[0].network_interfaces[0].association.public_ip }} (instance type: {{ aws_ec2_instance_type }})"
          - "  to connect to it: ssh -i {{ aws_ec2_ssh_private_key_file }} ec2-user@{{ ec2_instance.instances[0].network_interfaces[0].association.public_ip }}"
          - "RDS Endpoint: {{ rds_instance.endpoint.address }} (instance type: {{ aws_rds_instance_type }})"
          - "  to connect to it (from VM): PGPASSWORD=... psql --host {{ rds_instance.endpoint.address }} --port {{ aws_rds_port }} --username {{ aws_rds_user }} postgres"

    - name: Ensure results directory exists
      file:
        path: "{{ perf_results_dir }}"
        state: directory

    - name: Write setup metadata for test/fetch (timestamped name; safe for parallel matrices in same results dir)
      copy:
        content: "{{ {
          'perf_run_stamp': perf_run_stamp,
          'ec2_instance_id': ec2_instance.instances[0].instance_id,
          'rds_instance_id': rds_instance.db_instance_identifier,
          'aws_region': aws_region,
          'aws_rds_instance_type': aws_rds_instance_type,
          'aws_ec2_instance_type': aws_ec2_instance_type
        } | to_nice_json }}"
        dest: "{{ perf_results_dir }}/setup-metadata-{{ perf_run_stamp }}.json"
